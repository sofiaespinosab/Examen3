<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Servicio Telemático 🌸</title>
    <style>
        /* Configuración global y fondo cute */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffe5ec; /* Rosa pastel de fondo */
            background-image: radial-gradient(#ffb3c6 1px, transparent 1px);
            background-size: 20px 20px; /* Mini puntitos de fondo */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #4a3b32; /* Marrón suave para el texto, menos agresivo que el negro */
        }

        /* La tarjetita contenedora (Card) */
        .container {
            background-color: rgba(255, 255, 255, 0.9); /* Blanco semitransparente */
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 179, 198, 0.5); /* Sombra rosa suave */
            text-align: center;
            border: 3px solid #ffc2d1; /* Borde rosa dulce */
            max-width: 450px;
            width: 90%;
            position: relative;
        }

        /* Decoración de estrellitas/emojis en las esquinas */
        .container::before {
            content: "✨";
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 1.2rem;
        }
        .container::after {
            content: "🎀";
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 1.5rem;
        }

        /* Título principal */
        h1 {
            color: #ff4d6d; /* Rosa vibrante pero lindo */
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.05);
        }

        /* Párrafos */
        p {
            font-size: 1.05rem;
            line-height: 1.6;
            margin: 12px 0;
        }

        /* Destacados en texto (Docker, AWS, EC2) */
        .highlight {
            background-color: #fff0f3;
            color: #ff758f;
            padding: 2px 8px;
            border-radius: 8px;
            font-weight: bold;
            border: 1px dashed #ffb3c6;
        }

        /* Contenedor de la hora */
        .time-box {
            margin-top: 20px;
            padding: 12px;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            border-radius: 12px;
            font-weight: bold;
            color: #ff4d6d;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        #fecha {
            font-family: 'Courier New', Courier, monospace; /* Toque telemático/geek pero estético */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>¡Servicio desplegado con éxito! 🌸</h1>
        <p>Este contenedor <span class="highlight">Docker</span> está corriendo felizmente en una instancia <span class="highlight">AWS EC2</span>. ✨</p>
        
        <div class="time-box">
            🕒 Hora del servidor:<br>
            <span id="fecha"></span>
        </div>
    </div>

    <script>
        // Función para actualizar la hora con un formato lindo
        function actualizarHora() {
            const opciones = { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            };
            document.getElementById('fecha').innerText = new Date().toLocaleString('es-ES', opciones);
        }
        
        actualizarHora();
        setInterval(actualizarHora, 1000); // Se actualiza cada segundo para que se vea dinámico
    </script>

</body>
</html>
